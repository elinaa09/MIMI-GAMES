<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport", content="width=device-width, initial-scale=1.0">
        <title>Pacmi</title>
        <link rel="stylesheet" href="pacmi.css">
    </head>

    <body>

    <audio id="bgMusic" src="../sounds/background.mp3" loop autoplay></audio>
    <audio id="clickSound" src="../sounds/click.mp3"></audio>

        <h1>pacmi</h1>
        <canvas id="board"></canvas>
        <P class="hint">dont let snakes catch mimi!</P>
        <script src="pacmi.js"></script> 
        
        <div id="score-board">
    <span>Score: <span id="current-score">0</span></span>
    <span>Best: <span id="high-score">0</span></span>
</div>

<div id="game-over-screen" class="hidden">
    <h2>Game Over!</h2>
    <p>Score: <span id="final-score">0</span></p>
    <p>Best: <span id="final-high">0</span></p>
    <button onclick="restartPacmi()">Play Again</button>
</div>

    </body>
</html>
